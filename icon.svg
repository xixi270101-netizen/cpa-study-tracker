<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#475A6B"/>
      <stop offset="40%" stop-color="#5A7085"/>
      <stop offset="100%" stop-color="#7B94AB"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#F8F9FB"/>
      <stop offset="100%" stop-color="#ECEEF2"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C8B88A"/>
      <stop offset="100%" stop-color="#A89870"/>
    </linearGradient>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#2D3845" flood-opacity="0.35"/>
    </filter>
    <filter id="softLight">
      <feGaussianBlur stdDeviation="30" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="120" fill="url(#sky)"/>

  <!-- Subtle ambient light circle (top right glow) -->
  <circle cx="380" cy="120" r="180" fill="white" opacity="0.04" filter="url(#softLight)"/>

  <!-- Study card (like a premium desk setup) -->
  <g filter="url(#cardShadow)">
    <!-- Main card -->
    <rect x="106" y="144" width="300" height="260" rx="24" fill="url(#cardGrad)"/>

    <!-- Page lines - minimalist -->
    <line x1="146" y1="224" x2="366" y2="224" stroke="#D0D5DC" stroke-width="4" stroke-linecap="round"/>
    <line x1="146" y1="258" x2="366" y2="258" stroke="#D0D5DC" stroke-width="4" stroke-linecap="round"/>
    <line x1="146" y1="292" x2="366" y2="292" stroke="#D0D5DC" stroke-width="4" stroke-linecap="round"/>
    <line x1="146" y1="326" x2="296" y2="326" stroke="#D0D5DC" stroke-width="4" stroke-linecap="round"/>
    <line x1="146" y1="360" x2="326" y2="360" stroke="#D0D5DC" stroke-width="4" stroke-linecap="round"/>

    <!-- Top highlight on card edge -->
    <rect x="106" y="144" width="300" height="3" rx="1.5" fill="white" opacity="0.6"/>
  </g>

  <!-- Small golden accent line (like a bookmark or highlighter) -->
  <rect x="106" y="144" width="6" height="260" rx="3" fill="url(#accent)" opacity="0.7"/>

  <!-- Subtle corner highlight -->
  <path d="M126 164 Q126 150 140 150" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
</svg>
