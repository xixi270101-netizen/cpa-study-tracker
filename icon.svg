<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7B94AD"/>
      <stop offset="50%" stop-color="#8DA3B8"/>
      <stop offset="100%" stop-color="#9AAEC4"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#F0F3F7" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="check" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5C7289"/>
      <stop offset="100%" stop-color="#728BA3"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#3D4D5D" flood-opacity="0.2"/>
    </filter>
    <filter id="innerGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#3D4D5D" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="120" fill="url(#bg)"/>

  <!-- Subtle background pattern: tiny dots -->
  <g opacity="0.08">
    <circle cx="96" cy="96" r="4" fill="white"/>
    <circle cx="192" cy="64" r="3" fill="white"/>
    <circle cx="320" cy="80" r="5" fill="white"/>
    <circle cx="416" cy="120" r="3" fill="white"/>
    <circle cx="80" cy="420" r="4" fill="white"/>
    <circle cx="440" cy="400" r="5" fill="white"/>
    <circle cx="400" cy="440" r="3" fill="white"/>
    <circle cx="120" cy="380" r="3" fill="white"/>
  </g>

  <!-- Study card (notebook page) -->
  <g filter="url(#softShadow)">
    <rect x="128" y="130" width="256" height="270" rx="28" fill="url(#card)"/>
    <!-- Page lines -->
    <line x1="172" y1="210" x2="340" y2="210" stroke="#CDD6E0" stroke-width="6" stroke-linecap="round"/>
    <line x1="172" y1="250" x2="340" y2="250" stroke="#CDD6E0" stroke-width="6" stroke-linecap="round"/>
    <line x1="172" y1="290" x2="340" y2="290" stroke="#CDD6E0" stroke-width="6" stroke-linecap="round"/>
    <line x1="172" y1="330" x2="290" y2="330" stroke="#CDD6E0" stroke-width="6" stroke-linecap="round"/>
    <!-- Top accent bar -->
    <rect x="128" y="130" width="256" height="14" rx="7" fill="#8DA3B8" opacity="0.3"/>
  </g>

  <!-- Checkmark badge -->
  <g filter="url(#softShadow)">
    <circle cx="350" cy="340" r="72" fill="url(#check)"/>
    <circle cx="350" cy="340" r="66" fill="none" stroke="white" stroke-opacity="0.2" stroke-width="3"/>
    <!-- Checkmark -->
    <path d="M318 340 L339 361 L382 315" fill="none" stroke="white" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Small sparkle -->
  <g opacity="0.25">
    <circle cx="370" cy="130" r="8" fill="white"/>
    <line x1="370" y1="100" x2="370" y2="118" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <line x1="370" y1="142" x2="370" y2="160" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <line x1="340" y1="130" x2="358" y2="130" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <line x1="382" y1="130" x2="400" y2="130" stroke="white" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>
